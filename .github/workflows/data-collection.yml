name: NEPSE Data Collection

on:
  schedule:
    # Run every 30 minutes during market hours
    # Nepal market: 11:00 AM - 3:00 PM NPT (5:15 - 9:15 UTC, Sun-Fri)
    - cron: '*/30 5-9 * * 0-5'
    - cron: '*/30 5-9 * * 6'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: true
        default: 'live'
        type: choice
        options:
          - live
          - backfill
      days:
        description: 'Days to backfill (for backfill mode only)'
        required: false
        default: '1095'
        type: string

env:
  NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

jobs:
  collect-data:
    name: Collect NEPSE Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run data collection
        run: |
          cd backend
          if [ "${{ github.event.inputs.mode }}" == "backfill" ]; then
            echo "Running backfill for ${{ github.event.inputs.days || '1095' }} days..."
            python scripts/backfill.py --days ${{ github.event.inputs.days || '1095' }}
          else
            echo "Running live data collection..."
            python scripts/collect_live.py
          fi
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Get database stats
        if: success()
        run: |
          cd backend
          python -c "
          import psycopg2
          import os
          conn = psycopg2.connect(os.environ['NEON_DATABASE_URL'])
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM stock_prices')
          count = cur.fetchone()[0]
          cur.execute('SELECT MIN(date), MAX(date) FROM stock_prices')
          dates = cur.fetchone()
          print(f'✅ Database: {count} records ({dates[0]} to {dates[1]})')
          cur.close()
          conn.close()
          "
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
