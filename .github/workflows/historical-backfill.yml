name: NEPSE Historical Backfill

on:
  schedule:
    # Run every 5 minutes during market hours to backfill historical data
    # Nepal market: 11:00 AM - 3:00 PM NPT (5:15 - 9:15 UTC, Sun-Fri)
    - cron: '*/5 5-9 * * 0-5'
    - cron: '*/5 5-9 * * 6'

  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of stocks per batch'
        required: false
        default: '50'
        type: string

env:
  NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

jobs:
  backfill:
    name: Backfill Historical Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Run Merolagani backfill
        run: |
          cd backend
          python scripts/merolagani_scraper.py 2
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Get database stats
        if: success()
        run: |
          cd backend
          python -c "
          import os
          from dotenv import load_dotenv
          load_dotenv()
          import psycopg2
          conn = psycopg2.connect(os.getenv('NEON_DATABASE_URL'))
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM stock_prices')
          count = cur.fetchone()[0]
          cur.execute('SELECT MIN(date), MAX(date) FROM stock_prices')
          dates = cur.fetchone()
          print(f'Database: {count} records ({dates[0]} to {dates[1]})')
          cur.execute('SELECT COUNT(DISTINCT symbol) FROM stock_prices')
          symbols = cur.fetchone()[0]
          print(f'Stocks with data: {symbols}/348')
          cur.close()
          conn.close()
          "
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
